<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif;
    background: #1a0a0a;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ===== 翻页容器 ===== */
  .flip-container {
    perspective: 1200px;
    width: 100%;
    min-height: 100vh;
  }
  .flip-card {
    position: relative;
    width: 100%;
    min-height: 100vh;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-transform-style: preserve-3d;
    -webkit-transition: -webkit-transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .flip-card.flipped {
    transform: rotateY(-180deg);
    -webkit-transform: rotateY(-180deg);
  }

  /* ===== 正面（封面） ===== */
  .flip-front {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    min-height: 100vh;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: linear-gradient(180deg, #3a1518 0%, #5a2228 35%, #6e2d34 65%, #3a1518 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    overflow: hidden;
    z-index: 2;
  }

  /* 金色光晕 */
  .flip-front::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, transparent 70%);
    border-radius: 50%;
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }

  /* 金色边框圆 */
  .cover-ring {
    position: absolute;
    width: 260px; height: 260px;
    border: 1px solid rgba(212, 175, 55, 0.25);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: ringPulse 3s ease-in-out infinite;
  }
  .cover-ring:nth-child(2) {
    width: 300px; height: 300px;
    border-color: rgba(212, 175, 55, 0.12);
    animation-delay: 0.5s;
  }
  @keyframes ringPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
    50%      { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
  }

  .cover-ornament {
    color: rgba(212, 175, 55, 0.55);
    font-size: 14px;
    letter-spacing: 8px;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  .cover-char {
    font-size: 88px;
    font-weight: 400;
    color: #d4af37;
    text-shadow: 0 0 40px rgba(212, 175, 55, 0.35), 0 2px 4px rgba(0,0,0,0.5);
    line-height: 1;
    position: relative;
    z-index: 1;
    margin-bottom: 8px;
    font-family: "STKaiti", "KaiTi", "楷体", serif;
  }

  .cover-title {
    font-size: 22px;
    color: #f0e0c8;
    font-weight: 600;
    letter-spacing: 6px;
    position: relative;
    z-index: 1;
    margin-bottom: 12px;
  }

  .cover-name {
    font-size: 20px;
    color: #d4af37;
    font-weight: 500;
    letter-spacing: 3px;
    position: relative;
    z-index: 1;
    margin-bottom: 24px;
  }

  .cover-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.6), transparent);
    position: relative;
    z-index: 1;
    margin-bottom: 24px;
  }

  .cover-subtitle {
    font-size: 15px;
    color: rgba(240, 224, 200, 0.65);
    letter-spacing: 4px;
    position: relative;
    z-index: 1;
  }

  /* 翻页提示 */
  .flip-hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    text-align: center;
    cursor: pointer;
  }
  .flip-hint-label {
    font-size: 13px;
    color: rgba(212, 175, 55, 0.75);
    letter-spacing: 4px;
    margin-bottom: 8px;
    animation: hintPulse 2s ease-in-out infinite;
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 30px;
    padding: 8px 20px;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.5; transform: scale(0.97); }
    50%      { opacity: 1; transform: scale(1.03); }
  }

  /* ===== 背面（内容页） ===== */
  .flip-back {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    min-height: 100vh;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
    background: linear-gradient(180deg, #1a0a0a 0%, #fdf5e6 5%, #fdf5e6 95%, #1a0a0a 100%);
    color: #3d2b1f;
    overflow-y: auto;
    z-index: 1;
  }

  .back-inner {
    padding: 48px 28px 60px;
  }

  /* 金色横线 */
  .back-inner::before {
    content: '';
    display: block;
    width: 80%;
    max-width: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
    margin: 0 auto 40px;
  }

  /* 邀请文 */
  .invite-text {
    text-align: center;
    line-height: 2.4;
    font-size: 16px;
    color: #5a3e2b;
    letter-spacing: 1px;
    margin-bottom: 40px;
  }
  .invite-text .highlight {
    color: #8b1a1a;
    font-weight: 600;
    font-size: 18px;
  }

  /* 详情卡片 */
  .detail-card {
    background: #fff;
    border-radius: 12px;
    padding: 32px 24px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    max-width: 400px;
    margin: 0 auto 32px;
    border: 1px solid rgba(212, 175, 55, 0.15);
  }
  .detail-row {
    display: flex;
    align-items: flex-start;
    padding: 14px 0;
    border-bottom: 1px solid #f0e6d2;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8b1a1a, #a52a2a);
    color: #d4af37;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    margin-right: 14px;
    margin-top: 2px;
  }
  .detail-label {
    font-size: 12px;
    color: #b8936e;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .detail-value {
    font-size: 16px;
    color: #3d2b1f;
    font-weight: 500;
    line-height: 1.5;
  }
  .detail-value a {
    color: #3d2b1f;
    text-decoration: none;
  }

  /* 导航 */
  .nav-section {
    text-align: center;
    margin-top: 36px;
  }
  .nav-title {
    font-size: 14px;
    color: #b8936e;
    letter-spacing: 3px;
    margin-bottom: 20px;
  }
  .nav-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 22px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { transform: scale(0.96); }
  .nav-btn-gaode {
    background: #fff;
    color: #1677ff;
    border: 1px solid #1677ff;
    box-shadow: 0 2px 8px rgba(22,119,255,0.15);
  }
  .nav-btn-gaode:active { background: #e6f0ff; }
  .nav-btn-baidu {
    background: #fff;
    color: #de3925;
    border: 1px solid #de3925;
    box-shadow: 0 2px 8px rgba(222,57,37,0.15);
  }
  .nav-btn-baidu:active { background: #fff0ee; }
  .nav-icon {
    width: 20px; height: 20px;
  }

  /* 底栏 */
  .footer {
    text-align: center;
    padding: 40px 24px;
    background: #1a0a0a;
    color: rgba(245, 230, 200, 0.5);
    font-size: 13px;
    letter-spacing: 2px;
    line-height: 2;
  }
  .footer .gold {
    color: rgba(212, 175, 55, 0.7);
  }

  /* 响应式 */
  @media (min-width: 768px) {
    .cover-char { font-size: 108px; }
    .back-inner { padding: 56px 48px 72px; }
    .detail-card { padding: 40px 36px; }
  }
</style>
</head>
<body>

  </div>
</div>

<script>
  var flipped = false;
  function flip() {
    flipped = !flipped;
    var card = document.getElementById('flipCard');
    if (flipped) {
      card.classList.add('flipped');
    } else {
      card.classList.remove('flipped');
    }
  }
</script>
